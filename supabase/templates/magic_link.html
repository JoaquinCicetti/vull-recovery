<!doctype html>
<html lang="es">
  <body style="margin:0; padding:0; background-color:#000000;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#000000;">
      <tr>
        <td align="center" style="padding:40px 16px;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:440px; width:100%;">
            <!-- Wordmark -->
            <tr>
              <td style="padding-bottom:24px;">
                <span style="font-family:Arial,Helvetica,sans-serif; font-size:13px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; color:#61b33b;">VULL</span>
              </td>
            </tr>
            <!-- Card -->
            <tr>
              <td style="background-color:#0d0d0d; border:1px solid #262626; border-radius:12px; padding:32px;">
                <h1 style="margin:0 0 6px; font-family:Arial,Helvetica,sans-serif; font-size:20px; font-weight:700; color:#f4f4f4;">
                  Tu código de acceso
                </h1>
                <p style="margin:0 0 24px; font-family:Arial,Helvetica,sans-serif; font-size:14px; line-height:1.5; color:#bdbdbd;">
                  Ingresá este código para entrar a tu cuenta:
                </p>

                <!-- Code -->
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                  <tr>
                    <td align="center" style="background-color:#161616; border:1px solid #3a3a3a; border-radius:10px; padding:20px 12px;">
                      <span style="font-family:'Courier New',Courier,monospace; font-size:34px; font-weight:700; letter-spacing:12px; color:#f4f4f4;">{{ .Token }}</span>
                    </td>
                  </tr>
                </table>

                <p style="margin:24px 0 0; font-family:Arial,Helvetica,sans-serif; font-size:13px; line-height:1.5; color:#7d7d7d;">
                  El código vence en 1 hora. Si no lo solicitaste, ignorá este correo.
                </p>
              </td>
            </tr>
            <!-- No magic-link here on purpose: email security scanners pre-fetch
                 links and consume the single-use token, which made the code read as
                 "expired". Code only. -->
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
