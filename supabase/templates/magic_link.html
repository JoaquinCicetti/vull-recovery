<!doctype html>
<html lang="es">
  <body style="font-family: Arial, Helvetica, sans-serif; color: #1a1a1a; line-height: 1.5;">
    <h2 style="margin-bottom: 8px;">Tu código de acceso</h2>
    <p>Usá este código para ingresar:</p>
    <p style="font-size: 30px; font-weight: 700; letter-spacing: 6px; margin: 16px 0;">{{ .Token }}</p>
    <p>El código vence en 1 hora. Si no solicitaste esto, podés ignorar este correo.</p>
    <p style="color: #888; font-size: 12px; margin-top: 24px;">
      ¿No funciona el código? También podés
      <a href="{{ .ConfirmationURL }}">ingresar con este enlace</a>.
    </p>
  </body>
</html>
